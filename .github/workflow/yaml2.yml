name: Advanced Automation & CI/CD

on:
  pull_request:
    branches: ["main"]
    paths:
      - "**.js"
      - "package.json"
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "18"
  APP_ENV: "development"

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: echo "Linting..." 

      - name: Run tests
        run: |
          echo "Running tests..."
          echo "Test report" > report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Building app..."
          mkdir dist
          echo "Build output" > dist/app.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/

  deploy:
    name: Deployment
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main'

    env:
      APP_ENV: "production"

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/

      - name: Deploy
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Deploying in $APP_ENV environment"
          echo "Using secret"
          ls dist
          echo "Deployment complete"

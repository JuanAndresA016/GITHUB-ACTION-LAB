name: GitHub Actions Lab

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  GLOBAL_MESSAGE: "Running GitHub Actions Lab"

jobs:
  build:
    name: Build Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Print message
        run: echo "$GLOBAL_MESSAGE"
      - name: Build step
        run: |
          echo "Building project..."
          sleep 2
          echo "Build complete"

  test:
    name: Test Job
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "Running tests..."
          sleep 2
          echo "All tests passed"

  deploy:
    name: Deploy Job
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy step
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Deploying application..."
          echo "Using secret (hidden)"
          sleep 2
          echo "Deploy complete"
